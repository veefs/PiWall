<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>PiWall</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="icon" href="./logo.ico" type="image/x-icon">
</head>

<body>
    <main>



        <div class="title-card">
            <img src="logo.ico" alt="PiWall logo" class="title-icon">
            <h1 class="title-text">PiWall</h1>

            <div class="title-card-links">
                <a href="index.html">Home</a>
                <a>Config</a>

                    <div class="title-card-selected">
                <a href="./settings.html">Settings</a>
                    </div>
                <a href="./project.html">The Project</a>
            </div>
        </div>

        <div class="separator-card">

            <h1> General</h1>

        </div>

        <div class="setting-bar">
            <label class="switch">
                <input type="checkbox">
                <span class="slider round"></span>
            </label>
            <h1>Firewall Enabled</h1>
        </div>

        <div class="setting-bar">
            <label class="switch">
                <input type="checkbox">
                <span class="slider round"></span>
            </label>
            <h1>Monitor Traffic Enabled</h1>
        </div>

        <div class="separator-card">

            <h1> Privacy & Security</h1>
            
        </div>



        <div class="setting-bar">
            <label class="switch">
                <input type="checkbox">
                <span class="slider round"></span>
            </label>
            <h1>Child Filter</h1>

        </div>

                <div class="setting-bar">
            <label class="switch">
                <input type="checkbox">
                <span class="slider round"></span>
            </label>
            <h1>Yubikey Verification</h1>
        </div>

        <div class="separator-card">

            <h1> Webhooks </h1>
            
        </div>

        <div class="setting-bar">
            <label class="switch">
                <input type="checkbox">
                <span class="slider round"></span>
            </label>
            <h1>Discord Webhook Enabled</h1>
        </div>

        <div class="setting-bar">
            <label class="switch">
                <input type="checkbox">
                <span class="slider round"></span>
            </label>
            <h1>Twillio Webhook Enabled</h1>
        </div>

        <div class="setting-bar">
            <label class="switch">
                <input type="checkbox">
                <span class="slider round"></span>
            </label>
            <h1>AI Webhook Enabled</h1>
        </div>

        <div class="setting-bar">
            <label class="switch">
                <input type="checkbox">
                <span class="slider round"></span>
            </label>
            <h1>Get Webhook Enabled</h1>
        </div>

        <div class="setting-bar">
            <label class="switch">
                <input type="checkbox">
                <span class="slider round"></span>
            </label>
            <h1>Post Webhook Enabled</h1>
        </div>

    </main>
</body>

</html>
